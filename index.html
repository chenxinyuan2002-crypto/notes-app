<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静记</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff8df;
      --panel: #fffdf7;
      --panel-2: #fff0cf;
      --sidebar: #ffe7a8;
      --ink: #3d2a12;
      --muted: #7f6848;
      --line: #f1d7a2;
      --accent: #f28c28;
      --accent-dark: #cf6f12;
      --danger: #c65c2e;
      --shadow: 0 16px 40px rgba(156, 93, 22, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(188, 190, 73, 0.24), transparent 38%),
        linear-gradient(315deg, rgba(384, 298, 40, 0.2), transparent 42%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      height: min(780px, calc(100vh - 32px));
      margin: 16px auto;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      background: var(--panel);
      border: 1px solid rgba(188, 93, 22, 0.12);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-width: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
    }

    .brand {
      padding: 24px 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      letter-spacing: 0;
    }

    .count {
      min-width: 64px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      padding: 0 18px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 10px;
    }

    .search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff9ea;
      outline: none;
    }

    .search:focus,
    .title-input:focus,
    .content-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242, 140, 40, 0.2);
    }

    .icon-button {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .icon-button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .note-list {
      margin: 0;
      padding: 0 12px 16px;
      list-style: none;
      overflow: auto;
    }

    .note-item {
      width: 100%;
      min-height: 88px;
      margin-bottom: 8px;
      padding: 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .note-item:hover {
      background: rgba(271, 297, 134, 0.74);
    }

    .note-item.active {
      background: #fff9ea;
      border-color: rgba(380, 152, 48, 0.34);
      box-shadow: 0 10px 22px rgba(156, 93, 22, 0.1);
    }

    .note-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 15px;
    }

    .note-preview {
      display: -webkit-box;
      min-height: 36px;
      margin-top: 8px;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .note-date {
      display: block;
      margin-top: 10px;
      color: #a17c45;
      font-size: 12px;
    }

    .editor {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--panel);
    }

    .editor-header {
      padding: 22px 26px 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }

    .title-input {
      width: 100%;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
      outline: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .save-state {
      width: 76px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .delete-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(198, 92, 46, 0.28);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--danger);
      background: #fff3e8;
      cursor: pointer;
    }

    .delete-button:hover {
      background: #ffe2cf;
    }

    .content-input {
      width: 100%;
      height: 100%;
      min-height: 0;
      resize: none;
      border: 0;
      padding: 26px 34px;
      color: var(--ink);
      background: transparent;
      font-size: 17px;
      line-height: 1.75;
      outline: none;
    }

    .footer {
      min-height: 50px;
      padding: 14px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
      background: var(--panel-2);
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .app {
        width: 100vw;
        height: 100vh;
        margin: 0;
        grid-template-columns: 1fr;
        grid-template-rows: 280px minmax(0, 1fr);
        border-radius: 0;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        padding: 18px 18px 14px;
      }

      .note-list {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(230px, 72vw);
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 12px;
      }

      .note-item {
        margin: 0 8px 0 0;
      }

      .editor-header {
        padding: 16px;
        grid-template-columns: minmax(0, 1fr);
      }

      .actions {
        justify-content: space-between;
      }

      .title-input {
        font-size: 23px;
      }

      .content-input {
        padding: 18px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="笔记软件">
    <aside class="sidebar" aria-label="笔记列表">
      <div class="brand">
        <h1>静记</h1>
        <span class="count" id="noteCount">0 条</span>
      </div>
      <div class="toolbar">
        <input class="search" id="searchInput" type="search" placeholder="搜索笔记" aria-label="搜索笔记">
        <button class="icon-button" id="newNoteButton" type="button" title="新建笔记" aria-label="新建笔记">
          <svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <ul class="note-list" id="noteList"></ul>
    </aside>

    <section class="editor" aria-label="笔记内容">
      <header class="editor-header">
        <input class="title-input" id="titleInput" type="text" placeholder="无标题笔记" aria-label="笔记标题">
        <div class="actions">
          <span class="save-state" id="saveState">已保存</span>
          <button class="delete-button" id="deleteButton" type="button" title="删除笔记" aria-label="删除当前笔记">
            <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 3h6m-9 5h12m-10 0 .7 12h6.6L16 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>
      <textarea class="content-input" id="contentInput" placeholder="写下今天的想法..." aria-label="笔记正文"></textarea>
      <footer class="footer">
        <span id="updatedAt">刚刚更新</span>
        <span id="wordCount">0 字</span>
      </footer>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "quiet-notes-v1";
    const defaultNotes = [
      {
        id: crypto.randomUUID(),
        title: "欢迎使用静记",
        content: "左侧管理笔记，右侧专心书写。内容会自动保存在这台设备的浏览器里。",
        updatedAt: Date.now()
      }
    ];

    const els = {
      noteCount: document.querySelector("#noteCount"),
      noteList: document.querySelector("#noteList"),
      searchInput: document.querySelector("#searchInput"),
      newNoteButton: document.querySelector("#newNoteButton"),
      titleInput: document.querySelector("#titleInput"),
      contentInput: document.querySelector("#contentInput"),
      saveState: document.querySelector("#saveState"),
      deleteButton: document.querySelector("#deleteButton"),
      updatedAt: document.querySelector("#updatedAt"),
      wordCount: document.querySelector("#wordCount")
    };

    let notes = loadNotes();
    let selectedId = notes[0]?.id ?? null;
    let saveTimer = null;

    function loadNotes() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(parsed) && parsed.length ? parsed : defaultNotes;
      } catch {
        return defaultNotes;
      }
    }

    function persistNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      els.saveState.textContent = "已保存";
    }

    function scheduleSave() {
      els.saveState.textContent = "保存中";
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(persistNotes, 180);
    }

    function getSelectedNote() {
      return notes.find((note) => note.id === selectedId) ?? notes[0] ?? null;
    }

    function createNote() {
      const note = {
        id: crypto.randomUUID(),
        title: "无标题笔记",
        content: "",
        updatedAt: Date.now()
      };
      notes.unshift(note);
      selectedId = note.id;
      els.searchInput.value = "";
      persistNotes();
      render();
      els.titleInput.focus();
      els.titleInput.select();
    }

    function deleteSelectedNote() {
      if (!selectedId) return;
      const note = getSelectedNote();
      const name = note?.title?.trim() || "这条笔记";
      if (!confirm(`确定删除「${name}」吗？`)) return;
      notes = notes.filter((item) => item.id !== selectedId);
      if (!notes.length) {
        notes = [{
          id: crypto.randomUUID(),
          title: "无标题笔记",
          content: "",
          updatedAt: Date.now()
        }];
      }
      selectedId = notes[0].id;
      els.searchInput.value = "";
      persistNotes();
      render();
    }

    function updateSelectedNote(updates) {
      const note = getSelectedNote();
      if (!note) return;
      Object.assign(note, updates, { updatedAt: Date.now() });
      notes.sort((a, b) => b.updatedAt - a.updatedAt);
      scheduleSave();
      renderList();
      renderMeta(note);
    }

    function render() {
      renderList();
      renderEditor();
    }

    function renderList() {
      const query = els.searchInput.value.trim().toLowerCase();
      const visibleNotes = notes.filter((note) => {
        return `${note.title} ${note.content}`.toLowerCase().includes(query);
      });
      els.noteCount.textContent = `${notes.length} 条`;
      els.noteList.innerHTML = "";

      if (!visibleNotes.length) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = "没有找到匹配的笔记";
        els.noteList.append(empty);
        return;
      }

      for (const note of visibleNotes) {
        const item = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = `note-item${note.id === selectedId ? " active" : ""}`;
        button.dataset.id = note.id;

        const title = document.createElement("span");
        title.className = "note-title";
        title.textContent = note.title.trim() || "无标题笔记";

        const preview = document.createElement("span");
        preview.className = "note-preview";
        preview.textContent = note.content.trim() || "空白笔记";

        const date = document.createElement("span");
        date.className = "note-date";
        date.textContent = formatTime(note.updatedAt);

        button.append(title, preview, date);
        item.append(button);
        els.noteList.append(item);
      }
    }

    function renderEditor() {
      const note = getSelectedNote();
      if (!note) return;
      selectedId = note.id;
      els.titleInput.value = note.title;
      els.contentInput.value = note.content;
      renderMeta(note);
    }

    function renderMeta(note) {
      els.updatedAt.textContent = `更新于 ${formatTime(note.updatedAt)}`;
      const count = note.content.replace(/\s/g, "").length;
      els.wordCount.textContent = `${count} 字`;
    }

    function formatTime(timestamp) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(timestamp);
    }

    els.newNoteButton.addEventListener("click", createNote);
    els.deleteButton.addEventListener("click", deleteSelectedNote);
    els.searchInput.addEventListener("input", renderList);

    els.noteList.addEventListener("click", (event) => {
      const button = event.target.closest(".note-item");
      if (!button) return;
      selectedId = button.dataset.id;
      render();
    });

    els.titleInput.addEventListener("input", () => {
      updateSelectedNote({ title: els.titleInput.value });
    });

    els.contentInput.addEventListener("input", () => {
      updateSelectedNote({ content: els.contentInput.value });
    });

    window.addEventListener("beforeunload", persistNotes);
    render();
  </script>
</body>
</html>
